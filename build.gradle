// Root build for pipestream-opensearch.
// This is a composite build aggregator — actual projects are in subdirectories.
// Use: ./gradlew build                         — build everything (CI compatible)
//      cd opensearch-manager && quarkus dev     — run manager in dev mode

tasks.register('build') {
    description = 'Build all subprojects'
    group = 'build'
    dependsOn gradle.includedBuild('opensearch-manager').task(':build')
    dependsOn gradle.includedBuild('pipestream-opensearch-client').task(':pipestream-opensearch-client:build')
    dependsOn gradle.includedBuild('pipestream-opensearch-client').task(':pipestream-opensearch-client-deployment:build')
}

tasks.register('test') {
    description = 'Run all tests across subprojects'
    group = 'verification'
    dependsOn gradle.includedBuild('opensearch-manager').task(':test')
    dependsOn gradle.includedBuild('pipestream-opensearch-client').task(':pipestream-opensearch-client:test')
    dependsOn gradle.includedBuild('pipestream-opensearch-client').task(':pipestream-opensearch-client-deployment:test')
}

tasks.register('clean') {
    description = 'Clean all subprojects'
    group = 'build'
    dependsOn gradle.includedBuild('opensearch-manager').task(':clean')
    dependsOn gradle.includedBuild('pipestream-opensearch-client').task(':pipestream-opensearch-client:clean')
    dependsOn gradle.includedBuild('pipestream-opensearch-client').task(':pipestream-opensearch-client-deployment:clean')
}

tasks.register('publishToMavenLocal') {
    description = 'Publish all artifacts to Maven Local'
    group = 'publishing'
    dependsOn gradle.includedBuild('opensearch-manager').task(':publishToMavenLocal')
    dependsOn gradle.includedBuild('pipestream-opensearch-client').task(':pipestream-opensearch-client:publishToMavenLocal')
    dependsOn gradle.includedBuild('pipestream-opensearch-client').task(':pipestream-opensearch-client-deployment:publishToMavenLocal')
}

// Publish all artifacts (used by CI for GitHub Packages)
tasks.register('publish') {
    description = 'Publish all artifacts'
    group = 'publishing'
    dependsOn gradle.includedBuild('opensearch-manager').task(':publish')
}

// CI publish tasks — delegate to opensearch-manager's NMCP plugin
tasks.register('publishAllPublicationsToCentralPortalSnapshots') {
    description = 'Publish snapshots to Maven Central (CI)'
    group = 'publishing'
    dependsOn gradle.includedBuild('opensearch-manager').task(':publishAllPublicationsToCentralPortalSnapshots')
}

tasks.register('publishAllPublicationsToCentralPortal') {
    description = 'Publish releases to Maven Central (CI)'
    group = 'publishing'
    dependsOn gradle.includedBuild('opensearch-manager').task(':publishAllPublicationsToCentralPortal')
}
