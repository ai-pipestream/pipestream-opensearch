quarkus.application.name=opensearch-manager

# Container image configuration
quarkus.container-image.registry=ghcr.io
quarkus.container-image.group=ai-pipestream
quarkus.container-image.name=opensearch-manager
quarkus.container-image.tag=latest

# Quarkus Index Dependencies (CRITICAL for ConfigMapping discovery)

# Production port allocation. Context path matches app root name.
quarkus.http.port=18103
quarkus.http.host=0.0.0.0
quarkus.grpc.server.max-inbound-message-size=2147483647

# Internal telemetry endpoints
telemetry.rest.enabled=false
%dev.telemetry.rest.enabled=true
%test.telemetry.rest.enabled=true

# Development overrides
%dev.quarkus.http.port=18103

# Enable Compose Dev Services (Postgres, Kafka, Consul, OpenSearch, etc.)
%dev.quarkus.datasource.devservices.enabled=true

# Datasource configuration (PostgreSQL)
quarkus.datasource.db-kind=postgresql
quarkus.flyway.migrate-at-start=true
quarkus.datasource.username=${OPENSEARCH_MANAGER_DB_USER:pipeline}
quarkus.datasource.password=${OPENSEARCH_MANAGER_DB_PASSWORD:password}
# dev: explicit URL pointing to the compose-managed DB (init-postgres.sql creates it)
%dev.quarkus.datasource.jdbc.url=${OPENSEARCH_MANAGER_DB_URL:jdbc:postgresql://localhost:5432/opensearch_manager}
%dev.quarkus.datasource.reactive.url=${OPENSEARCH_MANAGER_DB_REACTIVE_URL:postgresql://localhost:5432/opensearch_manager}
%prod.quarkus.datasource.jdbc.url=${OPENSEARCH_MANAGER_DB_URL:jdbc:postgresql://localhost:5432/opensearch_manager}
%prod.quarkus.datasource.reactive.url=${OPENSEARCH_MANAGER_DB_REACTIVE_URL:postgresql://localhost:5432/opensearch_manager}
# Pool size dictates max concurrent IndexDocument throughput because each call
# does N sequential DB lookups (one per SemanticVectorSet) inside a transaction.
# 15 was starving the sink: 32 in-flight calls vs 15 connections = 17 perpetually queued,
# producing p99 IndexDocument latency of 700+ seconds. Bumped to match the OS pool.
quarkus.datasource.reactive.max-size=${OPENSEARCH_MANAGER_DB_REACTIVE_POOL_MAX:128}
quarkus.datasource.jdbc.max-size=${OPENSEARCH_MANAGER_DB_JDBC_POOL_MAX:128}

# ======================================================================================================================
# Service Registration Configuration
# ======================================================================================================================
pipestream.registration.enabled=true
pipestream.registration.service-name=opensearch-manager
pipestream.registration.description=OpenSearch indexing and search management service
pipestream.registration.type=SERVICE
# Host selection + discovery are provided by pipestream-server defaults.
# Override with SERVICE_REGISTRATION_* or pipestream.server.* if needed.
pipestream.registration.capabilities=opensearch-indexing,search-management,kafka-consumer
pipestream.registration.tags=opensearch,indexing,search,kafka-consumer

quarkus.grpc.server.enable-reflection-service=true

# Logging Configuration
quarkus.log.level=INFO
quarkus.log.category."ai.pipestream".level=INFO
quarkus.log.category."io.vertx.ext.consul".level=WARN
%dev.quarkus.log.console.level=INFO
%dev.quarkus.log.category."io.quarkus.grpc".level=WARN
%dev.quarkus.log.category."io.smallrye.stork".level=WARN

# OpenSearch Configuration (profile-specific so DevServices can provide in test mode)
%dev.opensearch.hosts=${OPENSEARCH_HOST:localhost}:${OPENSEARCH_PORT:9200}
%prod.opensearch.hosts=${OPENSEARCH_HOST:localhost}:${OPENSEARCH_PORT:9200}
opensearch.protocol=${OPENSEARCH_PROTOCOL:http}
opensearch.username=${OPENSEARCH_USERNAME:}
opensearch.password=${OPENSEARCH_PASSWORD:}
# Throughput: single fast OS instance (20GB heap, 20GB/s NVMe) — match per-route to total since all traffic targets one host
opensearch.max-connections=${OPENSEARCH_MAX_CONNECTIONS:128}
opensearch.max-connections-per-route=${OPENSEARCH_MAX_CONNECTIONS_PER_ROUTE:128}
# Large bulks can exceed 10s; align with client and avoid spurious failures under load
opensearch.socket-timeout=${OPENSEARCH_SOCKET_TIMEOUT_MS:120000}
# E2E / dev: knn index may use refresh_interval=-1; refresh makes doc counts visible for getIndexStats
opensearch-manager.index-stats.refresh-before-read=${OPENSEARCH_INDEX_STATS_REFRESH_BEFORE_READ:false}
%dev.opensearch-manager.index-stats.refresh-before-read=true

# Schema manager specific configuration
schema.manager.lock.timeout=PT10S

# VectorSet directive resolution (CEL selector length, inline tuple policy)
vectorset.semantic.inline-resolution.enabled=true
vectorset.semantic.source-cel.max-chars=1048576
%prod.vectorset.semantic.inline-resolution.enabled=false

# Kafka Configuration - only set for prod/dev; test lets DevServices provide bootstrap.servers
%prod.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
%dev.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
kafka.group.id=opensearch-manager

# Kafka Consumers - extension auto-configures deserializers for Protobuf types
mp.messaging.incoming.drive-updates-in.connector=smallrye-kafka
mp.messaging.incoming.drive-updates-in.topic=drive-updates

mp.messaging.incoming.repository-document-events-in.connector=smallrye-kafka
mp.messaging.incoming.repository-document-events-in.topic=repository-events

mp.messaging.incoming.module-updates-in.connector=smallrye-kafka
mp.messaging.incoming.module-updates-in.topic=module-updates

mp.messaging.incoming.pipedoc-updates-in.connector=smallrye-kafka
mp.messaging.incoming.pipedoc-updates-in.topic=pipedoc-updates

mp.messaging.incoming.process-request-updates-in.connector=smallrye-kafka
mp.messaging.incoming.process-request-updates-in.topic=process-request-updates

mp.messaging.incoming.process-response-updates-in.connector=smallrye-kafka
mp.messaging.incoming.process-response-updates-in.topic=process-response-updates

mp.messaging.incoming.graph-updates-in.connector=smallrye-kafka
mp.messaging.incoming.graph-updates-in.topic=graph-updates

mp.messaging.incoming.document-uploaded-events-in.connector=smallrye-kafka
mp.messaging.incoming.document-uploaded-events-in.topic=document-uploaded-events-out

# Semantic metadata events - published when ChunkerConfig, EmbeddingModelConfig, or IndexEmbeddingBinding change
mp.messaging.outgoing.semantic-metadata-events.connector=smallrye-kafka
mp.messaging.outgoing.semantic-metadata-events.topic=semantic-metadata-events
# Local E2E often has no Kafka; when false, a failed publish fails createChunkerConfig (gRPC UNKNOWN without description)
opensearch-manager.semantic-metadata.fail-open-publish=${OPENSEARCH_SEMANTIC_METADATA_FAIL_OPEN_PUBLISH:false}
%dev.opensearch-manager.semantic-metadata.fail-open-publish=true

# ======================================================================================================================
# KNN Vector Index Creation Settings
# ======================================================================================================================
# Primary shards for chunk indices (more = parallel HNSW construction across cores)
knn-index.number-of-shards=8
# Replicas during indexing (0 avoids duplicate HNSW graph construction)
knn-index.number-of-replicas=0
# Refresh interval during indexing (-1 disables, avoids tiny segment creation)
knn-index.refresh-interval=-1
# HNSW ef_construction (lower = faster indexing, slightly lower recall)
knn-index.ef-construction=100
# HNSW m (bidirectional links per node)
knn-index.hnsw-m=16

# ======================================================================================================================
# Bulk Indexing Queue Configuration
# ======================================================================================================================
# Number of concurrent draining queues. Fewer queues → each accumulates
# chunks from more concurrent docs before flushing → larger bulk calls →
# better OpenSearch throughput. Was 16; bumped down to 4 after observing
# that at current upstream rates (~0.5 docs/sec through semantic) each
# queue was flushing mostly a single doc's chunks because the flush
# interval fired before the round-robin could spread across docs.
bulk-indexing.queue-count=${BULK_QUEUE_COUNT:20}
# Size-based flush threshold. Hit this and a flush fires immediately.
# Total in-flight capacity = queue-count × capacity (20 × 500 = 10k chunks).
# Smaller bulks + more queues saturate OpenSearch harder: each flush is
# under typical HTTP/_bulk sweet spot (100-1000 docs) so OS indexers stay
# busy continuously rather than waiting 4s between giant bulks.
bulk-indexing.capacity=${BULK_QUEUE_CAPACITY:500}
# Time-based flush sweep. Shorter window keeps per-doc tail latency down
# when a queue has fewer than `capacity` chunks and would otherwise wait
# for the size trigger.
# Lowered 2000 → 500 on 2026-04-21 to attack the per-doc latency cap. Sink's
# processData blocks until every chunk of a doc is bulk-flushed; with 500 chunks
# spread across 20 queues, the doc's 99th-percentile flush wait was the 2000ms
# timer, not the 500-chunk size trigger. 500ms flush keeps OpenSearch
# continuously fed (its actual per-bulk round-trip is p50=27ms) and drops
# per-doc wall-clock from ~3.9s to ~1s — quadruples throughput ceiling.
bulk-indexing.flush-interval-ms=${BULK_FLUSH_INTERVAL_MS:500}

# HTTP/2 max concurrent streams per connection. Default is 100.
# With a single engine->module gRPC channel, that caps concurrent doc
# dispatches to 100. Under burst load we want many more in flight.
quarkus.http.http2.max-concurrent-streams=2000
