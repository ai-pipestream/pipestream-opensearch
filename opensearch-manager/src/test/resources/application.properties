%test.quarkus.devservices.enabled=true
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.devservices.db-name=opensearch_manager
%test.quarkus.datasource.devservices.username=pipeline
%test.quarkus.datasource.devservices.password=password
%test.quarkus.compose.devservices.enabled=false
%test.quarkus.kafka.devservices.enabled=true

# OpenSearch DevServices — starts testcontainer with gRPC transport enabled
%test.pipestream.opensearch.devservices.enabled=true
%test.pipestream.opensearch.devservices.image-name=opensearchproject/opensearch:3.5.0

# Test outgoing channel for drive-updates - extension auto-configures serializer for Protobuf types
%test.mp.messaging.outgoing.drive-updates-out.connector=smallrye-kafka
%test.mp.messaging.outgoing.drive-updates-out.topic=drive-updates

# Test HTTP configuration
%test.quarkus.http.test-port=0

# Disable service registration in tests but start Consul DevServices
# (Stork registrar still initializes and needs a reachable Consul)
%test.pipestream.registration.enabled=false
%test.quarkus.pipestream.service.registration.devservices.enabled=true