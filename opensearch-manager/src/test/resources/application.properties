%test.quarkus.devservices.enabled=true
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.devservices.db-name=opensearch_manager
%test.quarkus.datasource.devservices.username=pipeline
%test.quarkus.datasource.devservices.password=password
%test.quarkus.kafka.devservices.enabled=true

# OpenSearch DevServices — starts testcontainer with gRPC transport enabled
%test.pipestream.opensearch.devservices.enabled=true
%test.pipestream.opensearch.devservices.image-name=opensearchproject/opensearch:3.5.0

# Test outgoing channel for drive-updates - extension auto-configures serializer for Protobuf types
%test.mp.messaging.outgoing.drive-updates-out.connector=smallrye-kafka
%test.mp.messaging.outgoing.drive-updates-out.topic=drive-updates

# Test HTTP configuration
%test.quarkus.http.test-port=0

# Disable service registration in tests but start Consul DevServices
# (Stork registrar still initializes and needs a reachable Consul)
%test.pipestream.registration.enabled=false
%test.quarkus.pipestream.service.registration.devservices.enabled=true

# Redis DevServices for the indexing-stream consumer ITs. The consumer
# itself is OFF by default in the test profile; ITs that need it on
# enable it via @TestProfile or via per-test property overrides.
%test.quarkus.redis.devservices.enabled=true

# Required-when-enabled config for the redis indexing consumer. The
# @ConfigMapping declares these as Optional<T> so disabled-consumer tests
# validate without them, but having them set in the test profile makes
# enabling the consumer in an IT a one-line property override.
%test.pipestream.opensearch-manager.redis-indexing.stream-key-prefix=pipestream:indexing:
%test.pipestream.opensearch-manager.redis-indexing.dlq-key-prefix=pipestream:indexing-dlq:
%test.pipestream.opensearch-manager.redis-indexing.workers-per-stream=2
%test.pipestream.opensearch-manager.redis-indexing.read-batch-size=32
%test.pipestream.opensearch-manager.redis-indexing.read-block-ms=200
%test.pipestream.opensearch-manager.redis-indexing.pending-idle-ms=5000
%test.pipestream.opensearch-manager.redis-indexing.claim-interval-ms=1000
%test.pipestream.opensearch-manager.redis-indexing.max-in-flight-per-stream=8
%test.pipestream.opensearch-manager.redis-indexing.dlq-maxlen=10000
